<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Walky-Taky | by Saenchai</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        :root { --radio-body: #2a2a2a; --screen-bg: #879672; --accent: #ffcc00; }
        body { background: #121212; color: #fff; font-family: 'Courier New', monospace; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        
        /* Walkie Talkie Body */
        .walkie-talkie { background: var(--radio-body); width: 320px; padding: 30px; border-radius: 50px 50px 60px 60px; border: 8px solid #111; position: relative; box-shadow: 0 30px 60px rgba(0,0,0,0.8); }
        .antenna { width: 30px; height: 80px; background: #111; position: absolute; top: -75px; left: 50px; border-radius: 5px 5px 0 0; }
        
        /* Screen Design */
        .lcd-screen { background: var(--screen-bg); color: #1a1a1a; padding: 15px; border-radius: 8px; border: 4px inset rgba(0,0,0,0.4); min-height: 180px; display: flex; flex-direction: column; margin-bottom: 25px; box-shadow: inset 0 0 15px rgba(0,0,0,0.2); }
        .header { font-size: 0.7rem; font-weight: bold; border-bottom: 1px solid rgba(0,0,0,0.2); margin-bottom: 5px; display: flex; justify-content: space-between; }
        #log { font-size: 0.65rem; flex-grow: 1; overflow: hidden; line-height: 1.2; }
        .branding { font-size: 0.6rem; text-align: center; margin-top: 5px; opacity: 0.8; font-weight: bold; }

        /* PTT Button */
        #ptt { width: 120px; height: 120px; border-radius: 50%; border: 8px solid #111; background: radial-gradient(#444, #222); color: white; font-weight: 900; cursor: pointer; outline: none; margin: 10px auto; display: block; -webkit-tap-highlight-color: transparent; box-shadow: 0 6px 0 #000; transition: 0.1s; }
        #ptt:active:not(:disabled) { transform: translateY(4px); box-shadow: 0 2px 0 #000; background: radial-gradient(#d00, #800); }
        #ptt:disabled { opacity: 0.5; filter: grayscale(1); cursor: not-allowed; }

        .meter { height: 10px; background: rgba(0,0,0,0.2); border-radius: 5px; overflow: hidden; margin-top: 5px; }
        #fill { height: 100%; width: 0%; background: #222; transition: width 0.05s; }
        .blink { animation: blinker 1s linear infinite; }
        @keyframes blinker { 50% { opacity: 0.2; } }
    </style>
</head>
<body>

<div class="walkie-talkie">
    <div class="antenna"></div>
    <div class="lcd-screen">
        <div class="header">
            <span id="status">IDLE</span>
            <span>CH-01</span>
        </div>
        <div id="log"></div>
        <div class="meter"><div id="fill"></div></div>
        <div class="branding">WALKY-TAKY BY SAENCHAI</div>
    </div>
    
    <button id="ptt" disabled>PTT</button>
    <div style="text-align: center; margin-top: 15px;">
        <button id="pwr" style="background:var(--accent); border:none; padding:10px 20px; border-radius:5px; font-weight:bold;" onclick="boot()">POWER ON</button>
    </div>
</div>

<script>
    const config = {
        apiKey: "AIzaSyBRZ_E78l5EDRAgyHvE81aZAg9XWZySNrE",
        databaseURL: "https://walky-taky-6b118-default-rtdb.firebaseio.com",
        projectId: "walky-taky-6b118"
    };
    firebase.initializeApp(config);
    const db = firebase.database().ref('walkytaky_saenchai');
    
    let audioCtx, isTalking = false, currentSlice = [], nextStartTime = 0;
    const ptt = document.getElementById('ptt');

    function addLog(m) {
        const l = document.getElementById('log');
        const d = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit', second:'2-digit'});
        l.innerHTML += `[${d}] ${m}<br>`;
        if(l.childNodes.length > 12) l.removeChild(l.firstChild);
    }

    function beep(freq, duration) {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.frequency.value = freq;
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        osc.start();
        osc.stop(audioCtx.currentTime + duration);
    }

    async function boot() {
        document.getElementById('pwr').style.display = 'none';
        addLog("System Initializing...");
        try {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 16000 });
            const stream = await navigator.mediaDevices.getUserMedia({ audio: { echoCancellation: true, noiseSuppression: true } });
            const source = audioCtx.createMediaStreamSource(stream);
            const processor = audioCtx.createScriptProcessor(2048, 1, 1);
            
            source.connect(processor);
            processor.connect(audioCtx.destination);

            processor.onaudioprocess = (e) => {
                if (isTalking) {
                    const input = e.inputBuffer.getChannelData(0);
                    currentSlice.push(...Array.from(input));
                    if (currentSlice.length >= 4000) {
                        db.child('voice').set(btoa(JSON.stringify(currentSlice)));
                        currentSlice = [];
                    }
                }
            };

            // Global Lock & Audio Listener
            db.on('value', (snap) => {
                const val = snap.val();
                if (!val) return;

                // Handle Transmission Lock
                if (val.lockedBy && val.lockedBy !== audioCtx.baseLatency) {
                    ptt.disabled = true;
                    document.getElementById('status').innerText = "BUSY";
                    document.getElementById('status').classList.add('blink');
                } else {
                    ptt.disabled = false;
                    document.getElementById('status').innerText = "IDLE";
                    document.getElementById('status').classList.remove('blink');
                }

                // Handle Audio Playback
                if (val.voice && !isTalking) {
                    const raw = JSON.parse(atob(val.voice));
                    play(new Float32Array(raw));
                }
            });

            ptt.disabled = false;
            addLog("Frequency Set: 446.0 MHz");
            addLog("Ready to Transmit.");
        } catch (err) { addLog("Error: Mic Denied"); }
    }

    function play(data) {
        const b = audioCtx.createBuffer(1, data.length, 16000);
        b.getChannelData(0).set(data);
        const s = audioCtx.createBufferSource();
        s.buffer = b;
        s.connect(audioCtx.destination);
        const now = audioCtx.currentTime;
        if (nextStartTime < now) nextStartTime = now + 0.05;
        s.start(nextStartTime);
        nextStartTime += b.duration;
        
        let sum = 0; for(let i=0; i<data.length; i++) sum += Math.abs(data[i]);
        document.getElementById('fill').style.width = Math.min(100, (sum/data.length)*1200) + "%";
    }

    ptt.onmousedown = ptt.ontouchstart = (e) => {
        e.preventDefault();
        if (ptt.disabled) return;
        isTalking = true;
        beep(880, 0.1); // Start Beep
        db.child('lockedBy').set(audioCtx.baseLatency);
        addLog("TX Mode Active");
    };

    ptt.onmouseup = ptt.ontouchend = () => {
        if (!isTalking) return;
        setTimeout(() => {
            isTalking = false;
            db.child('lockedBy').remove();
            beep(440, 0.1); // End Beep
            addLog("TX Mode Ended");
        }, 300);
    };
</script>
</body>
</html>
