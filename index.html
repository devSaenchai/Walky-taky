<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Echo1: Vi-Jio Final</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        :root { --radio-green: #94ad94; --radio-dark: #1a1a1a; }
        body { background: var(--radio-dark); color: #fff; font-family: monospace; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; touch-action: none; overflow: hidden; }
        .radio-body { background: #333; width: 300px; padding: 25px; border-radius: 40px; border: 4px solid #222; text-align: center; }
        .screen { background: var(--radio-green); color: #1a1a1a; padding: 10px; border-radius: 10px; font-weight: bold; margin-bottom: 15px; border: 4px inset rgba(0,0,0,0.2); min-height: 220px; display: flex; flex-direction: column; position: relative; }
        #log { flex-grow: 1; font-size: 0.6rem; text-align: left; overflow-y: auto; background: rgba(0,0,0,0.05); padding: 5px; max-height: 100px; margin: 5px 0; }
        #ptt-btn { width: 120px; height: 120px; border-radius: 50%; border: 8px solid #222; background: radial-gradient(#555, #222); color: white; font-weight: bold; outline: none; -webkit-tap-highlight-color: transparent; display: none; margin: 0 auto; }
        #ptt-btn:active { background: radial-gradient(#f22, #800); transform: translateY(2px); }
        .pwr { background: #0f0; color: #000; border: none; padding: 15px 30px; border-radius: 50px; font-weight: bold; cursor: pointer; }
        .meter { height: 12px; background: rgba(0,0,0,0.2); border-radius: 6px; overflow: hidden; margin-top: 5px; }
        #fill { height: 100%; width: 0%; background: #000; transition: width 0.1s; }
        #unmute-overlay { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(255,0,0,0.8); color: white; display: none; align-items: center; justify-content: center; font-size: 0.8rem; border-radius: 10px; cursor: pointer; z-index: 10; padding: 10px; }
    </style>
</head>
<body>

    <div class="radio-body">
        <button id="pwr" class="pwr" onclick="init()">POWER ON RADIO</button>
        <div id="ui" style="display:none;">
            <div class="screen">
                <div id="unmute-overlay" onclick="forceUnmute()">⚠️ TAP HERE TO START SPEAKER</div>
                <div style="font-size: 0.7rem; display: flex; justify-content: space-between;">
                    <span id="stat">CONNECTING...</span>
                    <span id="timer">00:00</span>
                </div>
                <div id="log"></div>
                <div style="font-size: 0.6rem; opacity: 0.7;">INCOMING SIGNAL:</div>
                <div class="meter"><div id="fill"></div></div>
            </div>
            <button id="ptt-btn">HOLD TO TALK</button>
        </div>
    </div>

    <script>
        const config = {
          apiKey: "AIzaSyBRZ_E78l5EDRAgyHvE81aZAg9XWZySNrE",
          databaseURL: "https://walky-taky-6b118-default-rtdb.firebaseio.com",
          projectId: "walky-taky-6b118"
        };

        firebase.initializeApp(config);
        const db = firebase.database().ref('vi_jio_final_v11');
        let myPeer, myStream, audioCtx, remoteAnalyzer, startTime;
        let connected = new Set();

        function addLog(m) {
            const l = document.getElementById('log');
            l.innerHTML += `> ${m}<br>`;
            l.scrollTop = l.scrollHeight;
        }

        async function init() {
            document.getElementById('pwr').style.display = 'none';
            document.getElementById('ui').style.display = 'block';
            startTime = new Date();
            
            try {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                myStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                myStream.getAudioTracks()[0].enabled = false;

                myPeer = new Peer({
                    config: {
                        'iceServers': [
                            { urls: 'stun:stun.l.google.com:19302' },
                            { urls: 'turn:openrelay.metered.ca:443', username: 'openrelayproject', credential: 'openrelayproject' }
                        ],
                        'iceTransportPolicy': 'relay'
                    }
                });

                myPeer.on('open', (id) => {
                    addLog("Carrier Tunnel Ready.");
                    db.push(id).onDisconnect().remove();
                    db.on('value', snap => {
                        const ids = snap.val() ? Object.values(snap.val()) : [];
                        ids.forEach(tid => {
                            if (tid !== id && !connected.has(tid)) {
                                const call = myPeer.call(tid, myStream);
                                call.on('stream', s => finalize(s, tid));
                            }
                        });
                    });
                });

                myPeer.on('call', c => {
                    c.answer(myStream);
                    c.on('stream', s => finalize(s, c.peer));
                });

                setInterval(updateLoop, 100);
            } catch (e) { addLog("Error: Mic Access Required"); }
        }

        function finalize(stream, id) {
            if (connected.has(id)) return;
            connected.add(id);
            
            const source = audioCtx.createMediaStreamSource(stream);
            const gain = audioCtx.createGain();
            gain.gain.value = 4.0; // HIGH VOLUME BOOST for mobile data
            
            remoteAnalyzer = audioCtx.createAnalyzer();
            source.connect(gain);
            gain.connect(remoteAnalyzer);
            remoteAnalyzer.connect(audioCtx.destination);

            addLog("VOICE LINK ACTIVE");
            document.getElementById('stat').innerText = "LINKED";
            document.getElementById('ptt-btn').style.display = 'block';
            document.getElementById('unmute-overlay').style.display = 'flex';
        }

        function forceUnmute() {
            if (audioCtx) audioCtx.resume();
            document.getElementById('unmute-overlay').style.display = 'none';
        }

        function updateLoop() {
            if (startTime) {
                const diff = Math.floor((new Date() - startTime) / 1000);
                document.getElementById('timer').innerText = 
                    Math.floor(diff/60).toString().padStart(2,'0') + ":" + (diff%60).toString().padStart(2,'0');
            }
            if (remoteAnalyzer) {
                const data = new Uint8Array(remoteAnalyzer.frequencyBinCount);
                remoteAnalyzer.getByteFrequencyData(data);
                const vol = data.reduce((a, b) => a + b) / data.length;
                document.getElementById('fill').style.width = Math.min(100, vol * 5) + "%";
            }
        }

        const ptt = document.getElementById('ptt-btn');
        const start = (e) => {
            if(e) e.preventDefault();
            if(audioCtx) audioCtx.resume();
            if(myStream) myStream.getAudioTracks()[0].enabled = true;
            document.getElementById('stat').innerText = "TRANSMIT";
        };
        const stop = () => {
            if(myStream) myStream.getAudioTracks()[0].enabled = false;
            document.getElementById('stat').innerText = "LINKED";
        };

        ptt.addEventListener('touchstart', start);
        ptt.addEventListener('touchend', stop);
        ptt.addEventListener('mousedown', start);
        ptt.addEventListener('mouseup', stop);
        window.onclick = () => { if(audioCtx) audioCtx.resume(); };
    </script>
</body>
</html>
