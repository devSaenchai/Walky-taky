<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Echo1 Ultra-Link</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        body { background: #121212; color: #0f0; font-family: monospace; text-align: center; padding: 20px; }
        .radio-box { border: 2px solid #333; border-radius: 20px; padding: 20px; background: #1a1a1a; display: inline-block; width: 90%; max-width: 300px; }
        #ptt-btn { width: 160px; height: 160px; border-radius: 50%; background: #333; border: 5px solid #222; color: white; font-weight: bold; margin-top: 30px; display: none; box-shadow: 0 6px 0 #000; }
        #ptt-btn:active { background: #f00; transform: translateY(4px); box-shadow: 0 2px 0 #000; }
        .pwr-on { background: #0f0; color: #000; padding: 15px 30px; border-radius: 50px; font-weight: bold; border: none; }
        .status-led { width: 10px; height: 10px; border-radius: 50%; background: #300; display: inline-block; margin-right: 10px; }
        .led-active { background: #f00; box-shadow: 0 0 10px #f00; }
    </style>
</head>
<body>

    <div class="radio-box">
        <div style="font-size: 0.8rem; color: #888; margin-bottom: 10px;">WALKY-TAKY v4.0</div>
        <div id="stat-text">HARDWARE STANDBY</div>
        <div id="peer-val" style="font-size: 0.7rem;">PEERS: 0</div>
        
        <button id="start-pwr" class="pwr-on" style="margin-top: 20px;">SYSTEM POWER ON</button>
        
        <div id="controls" style="display:none;">
            <div id="led" class="status-led"></div>
            <button id="ptt-btn">PUSH TO TALK</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyBRZ_E78l5EDRAgyHvE81aZAg9XWZySNrE",
          authDomain: "walky-taky-6b118.firebaseapp.com",
          databaseURL: "https://walky-taky-6b118-default-rtdb.firebaseio.com",
          projectId: "walky-taky-6b118",
          storageBucket: "walky-taky-6b118.firebasestorage.app",
          messagingSenderId: "822437639384",
          appId: "1:822437639384:web:4112a27eb316d9e24693ad"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database().ref('radio_v4');
        let myPeer, myStream, audioCtx;
        const activeCalls = new Map();

        document.getElementById('start-pwr').onclick = async () => {
            try {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                myStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                myStream.getAudioTracks()[0].enabled = false;

                document.getElementById('start-pwr').style.display = 'none';
                document.getElementById('controls').style.display = 'block';
                document.getElementById('ptt-btn').style.display = 'block';
                document.getElementById('stat-text').innerText = "CONNECTING NETWORK...";

                startPeer();
            } catch (e) { alert("Mic Permission Denied"); }
        };

        function startPeer() {
            // FIX: Using Google's STUN servers to bypass Firewalls/NAT
            myPeer = new Peer({
                config: {
                    'iceServers': [
                        { url: 'stun:stun.l.google.com:19302' },
                        { url: 'stun:stun1.l.google.com:19302' }
                    ]
                }
            });

            myPeer.on('open', (id) => {
                document.getElementById('stat-text').innerText = "ONLINE / READY";
                const myRef = db.push(id);
                myRef.onDisconnect().remove();

                // Heartbeat to keep connection alive on mobile
                setInterval(() => { if(myPeer) myPeer.socket.send({type: 'HEARTBEAT'}); }, 5000);

                db.on('value', snap => {
                    const ids = snap.val() ? Object.values(snap.val()) : [];
                    document.getElementById('peer-val').innerText = "PEERS: " + (ids.length - 1);
                    ids.forEach(tid => {
                        if(tid !== id && !activeCalls.has(tid)) {
                            const call = myPeer.call(tid, myStream);
                            call.on('stream', s => playRemote(s, tid));
                            activeCalls.set(tid, call);
                        }
                    });
                });
            });

            myPeer.on('call', c => {
                c.answer(myStream);
                c.on('stream', s => playRemote(s, c.peer));
            });
        }

        function playRemote(stream, id) {
            const audio = new Audio();
            audio.srcObject = stream;
            audio.play().catch(() => {
                document.getElementById('stat-text').innerText = "TAP TO UNMUTE";
            });
        }

        const ptt = document.getElementById('ptt-btn');
        const led = document.getElementById('led');

        const talk = (e) => {
            if(e) e.preventDefault();
            if(audioCtx.state === 'suspended') audioCtx.resume();
            if(myStream) myStream.getAudioTracks()[0].enabled = true;
            led.classList.add('led-active');
            document.getElementById('stat-text').innerText = "TRANSMITTING...";
        };

        const stop = () => {
            if(myStream) myStream.getAudioTracks()[0].enabled = false;
            led.classList.remove('led-active');
            document.getElementById('stat-text').innerText = "ONLINE / READY";
        };

        ptt.addEventListener('touchstart', talk);
        ptt.addEventListener('touchend', stop);
        ptt.addEventListener('mousedown', talk);
        ptt.addEventListener('mouseup', stop);
        // Safety: Global unmute
        window.onclick = () => { if(audioCtx) audioCtx.resume(); };
    </script>
</body>
</html>
