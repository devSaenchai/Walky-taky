<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Echo1: Optimized Ghost-Link</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        :root { --r-green: #94ad94; --r-dark: #1a1a1a; }
        body { background: var(--r-dark); color: #fff; font-family: monospace; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        .radio { background: #333; width: 310px; padding: 25px; border-radius: 45px; border: 6px solid #111; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.9); }
        .screen { background: var(--r-green); color: #1a1a1a; padding: 12px; border-radius: 12px; font-weight: bold; min-height: 220px; display: flex; flex-direction: column; margin-bottom: 20px; border: 4px inset rgba(0,0,0,0.3); }
        #ptt { width: 140px; height: 140px; border-radius: 50%; border: 10px solid #222; background: radial-gradient(#666, #222); color: white; font-weight: 900; outline: none; display: none; margin: 0 auto; -webkit-tap-highlight-color: transparent; box-shadow: 0 8px 0 #111; transition: all 0.1s; }
        #ptt:active { background: radial-gradient(#f00, #800); transform: translateY(4px); box-shadow: 0 2px 0 #111; }
        .meter { height: 15px; background: rgba(0,0,0,0.2); border-radius: 8px; overflow: hidden; margin-top: 10px; border: 1px solid rgba(0,0,0,0.1); }
        #fill { height: 100%; width: 0%; background: #000; transition: width 0.05s; }
        .blink { animation: blinker 0.8s linear infinite; color: #b00; }
        @keyframes blinker { 50% { opacity: 0; } }
    </style>
</head>
<body>

    <div class="radio">
        <button id="pwr" style="background:#0f0; color:#000; padding:18px 30px; border-radius:50px; font-weight:900; border:none; cursor:pointer;" onclick="boot()">BOOT SECURE LINK</button>
        <div id="ui" style="display:none;">
            <div class="screen">
                <div style="font-size: 0.8rem; display: flex; justify-content: space-between; border-bottom: 2px solid rgba(0,0,0,0.2); padding-bottom: 5px;">
                    <span id="stat">SCANNING</span>
                    <span id="timer">00:00</span>
                </div>
                <div id="log" style="font-size:0.6rem; text-align:left; flex-grow:1; overflow:hidden; padding: 10px 0; line-height: 1.3;"></div>
                <div style="font-size: 0.6rem; font-weight: 900; letter-spacing: 1px; text-transform: uppercase;">Real-Time Data Pipe:</div>
                <div class="meter"><div id="fill"></div></div>
            </div>
            <button id="ptt">TALK</button>
        </div>
    </div>

    <script>
        // DEVELOPER CONFIG
        const config = {
            apiKey: "AIzaSyBRZ_E78l5EDRAgyHvE81aZAg9XWZySNrE",
            databaseURL: "https://walky-taky-6b118-default-rtdb.firebaseio.com",
            projectId: "walky-taky-6b118"
        };
        firebase.initializeApp(config);
        const db = firebase.database().ref('optimized_v19');
        
        let audioCtx, isTalking = false, currentSlice = [], nextStartTime = 0;

        function addLog(m) { 
            const l = document.getElementById('log');
            l.innerHTML += `> ${m}<br>`; 
            if(l.childNodes.length > 9) l.removeChild(l.firstChild);
        }

        async function boot() {
            document.getElementById('pwr').style.display = 'none';
            document.getElementById('ui').style.display = 'block';
            addLog("Bypassing Network DPI...");

            try {
                // Optimized sample rate for mobile data
                audioCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 16000 });
                const stream = await navigator.mediaDevices.getUserMedia({ audio: { echoCancellation: true, noiseSuppression: true } });
                const source = audioCtx.createMediaStreamSource(stream);
                
                // 2048 provides lower latency than 4096
                const processor = audioCtx.createScriptProcessor(2048, 1, 1);
                source.connect(processor);
                processor.connect(audioCtx.destination);

                processor.onaudioprocess = (e) => {
                    if (isTalking) {
                        const input = e.inputBuffer.getChannelData(0);
                        currentSlice.push(...Array.from(input));
                        // Batching at 4000 samples (~0.25s) for smooth delivery
                        if (currentSlice.length >= 4000) {
                            db.child('ch').set(btoa(JSON.stringify(currentSlice)));
                            currentSlice = [];
                        }
                    }
                };

                db.child('ch').on('value', (snap) => {
                    const data = snap.val();
                    if (data && !isTalking) {
                        const raw = JSON.parse(atob(data));
                        play(new Float32Array(raw));
                        updateMeter(raw);
                    }
                });

                document.getElementById('ptt').style.display = 'block';
                addLog("Link Secure. Jitter Buffer Active.");
            } catch (err) { addLog("Critical: Check Mic Permission"); }
        }

        function play(data) {
            const b = audioCtx.createBuffer(1, data.length, 16000);
            b.getChannelData(0).set(data);
            const s = audioCtx.createBufferSource();
            s.buffer = b;
            s.connect(audioCtx.destination);

            // Jitter Buffer logic to prevent "choppy" sound
            const currentTime = audioCtx.currentTime;
            if (nextStartTime < currentTime) {
                nextStartTime = currentTime + 0.05; 
            }
            s.start(nextStartTime);
            nextStartTime += b.duration;
        }

        function updateMeter(data) {
            let sum = 0;
            for(let i=0; i<data.length; i++) sum += Math.abs(data[i]);
            document.getElementById('fill').style.width = Math.min(100, (sum/data.length)*1200) + "%";
        }

        const ptt = document.getElementById('ptt');
        const start = (e) => { 
            e.preventDefault(); 
            isTalking = true; 
            if(audioCtx.state === 'suspended') audioCtx.resume();
            document.getElementById('stat').innerText = "TRANSMIT";
            document.getElementById('stat').classList.add('blink');
        };
        const end = () => { 
            isTalking = true; // Briefly stay true to finish the last batch
            setTimeout(() => { isTalking = false; }, 200);
            document.getElementById('stat').innerText = "LINKED";
            document.getElementById('stat').classList.remove('blink');
        };

        ptt.onmousedown = ptt.ontouchstart = start;
        ptt.onmouseup = ptt.ontouchend = end;
        window.onclick = () => { if(audioCtx) audioCtx.resume(); };
    </script>
</body>
</html>
