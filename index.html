<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Echo1: Final True-Call</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        :root { --r-green: #94ad94; --r-dark: #1a1a1a; }
        body { background: var(--r-dark); color: #fff; font-family: monospace; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        .radio { background: #333; width: 310px; padding: 25px; border-radius: 45px; border: 6px solid #111; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.9); }
        .screen { background: var(--r-green); color: #1a1a1a; padding: 12px; border-radius: 12px; font-weight: bold; min-height: 220px; display: flex; flex-direction: column; margin-bottom: 20px; border: 4px inset rgba(0,0,0,0.3); }
        #ptt { width: 140px; height: 140px; border-radius: 50%; border: 10px solid #222; background: radial-gradient(#666, #222); color: white; font-weight: 900; outline: none; display: none; margin: 0 auto; -webkit-tap-highlight-color: transparent; box-shadow: 0 8px 0 #111; }
        #ptt:active { background: radial-gradient(#f00, #800); transform: translateY(4px); box-shadow: 0 2px 0 #111; }
        .meter { height: 15px; background: rgba(0,0,0,0.2); border-radius: 8px; overflow: hidden; margin-top: 10px; }
        #fill { height: 100%; width: 0%; background: #000; transition: width 0.05s; }
    </style>
</head>
<body>

    <div class="radio">
        <button id="pwr" style="background:#0f0; color:#000; padding:18px 30px; border-radius:50px; font-weight:900; border:none;" onclick="boot()">INITIALIZE CALL ENGINE</button>
        <div id="ui" style="display:none;">
            <div class="screen">
                <div style="font-size: 0.8rem; display: flex; justify-content: space-between;">
                    <span id="stat">STABLE</span>
                    <span id="timer">00:00</span>
                </div>
                <div id="log" style="font-size:0.5rem; text-align:left; flex-grow:1; overflow:hidden; padding: 10px 0;"></div>
                <div style="font-size: 0.6rem; font-weight: 900;">LIVE VOICE PIPE:</div>
                <div class="meter"><div id="fill"></div></div>
            </div>
            <button id="ptt">TALK</button>
        </div>
    </div>

    <script>
        const config = {
            apiKey: "AIzaSyBRZ_E78l5EDRAgyHvE81aZAg9XWZySNrE",
            databaseURL: "https://walky-taky-6b118-default-rtdb.firebaseio.com",
            projectId: "walky-taky-6b118"
        };
        firebase.initializeApp(config);
        const db = firebase.database().ref('call_v23');
        
        let audioCtx, isTalking = false, scheduledTime = 0;

        async function boot() {
            document.getElementById('pwr').style.display = 'none';
            document.getElementById('ui').style.display = 'block';
            
            try {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 16000 });
                const stream = await navigator.mediaDevices.getUserMedia({ audio: { echoCancellation: true, noiseSuppression: true } });
                const source = audioCtx.createMediaStreamSource(stream);
                const processor = audioCtx.createScriptProcessor(1024, 1, 1);
                
                source.connect(processor);
                processor.connect(audioCtx.destination);

                processor.onaudioprocess = (e) => {
                    if (isTalking) {
                        const input = e.inputBuffer.getChannelData(0);
                        const p = new Int16Array(input.length);
                        for(let i=0; i<input.length; i++) p[i] = input[i] * 0x7FFF;
                        // Atomic update prevents connection loss if DB was cleared
                        db.update({ "p": btoa(String.fromCharCode(...new Uint16Array(p.buffer))) });
                    }
                };

                // Self-healing listener
                db.child('p').on('value', (snap) => {
                    const data = snap.val();
                    if (data && !isTalking) {
                        const bin = atob(data);
                        const uint = new Uint16Array(bin.length);
                        for(let i=0; i<bin.length; i++) uint[i] = bin.charCodeAt(i);
                        const float = new Float32Array(new Int16Array(uint.buffer)).map(v => v/0x7FFF);
                        play(float);
                    }
                });

                document.getElementById('ptt').style.display = 'block';
            } catch (err) { alert("Enable Mic permissions for Call."); }
        }

        function play(data) {
            const buffer = audioCtx.createBuffer(1, data.length, 16000);
            buffer.getChannelData(0).set(data);
            const source = audioCtx.createBufferSource();
            source.buffer = buffer;

            // Soft-clipping gain for clear voice
            const gainNode = audioCtx.createGain();
            gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
            gainNode.gain.linearRampToValueAtTime(1, audioCtx.currentTime + 0.005);
            
            source.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            const now = audioCtx.currentTime;
            // 0.1s buffer hides network jitter without noticeable delay
            if (scheduledTime < now) scheduledTime = now + 0.1;
            
            source.start(scheduledTime);
            scheduledTime += (buffer.duration - 0.002);
            
            let sum = 0; for(let i=0; i<data.length; i++) sum += Math.abs(data[i]);
            document.getElementById('fill').style.width = Math.min(100, (sum/data.length)*1500) + "%";
        }

        const ptt = document.getElementById('ptt');
        const press = (e) => { e.preventDefault(); isTalking = true; audioCtx.resume(); };
        const release = () => { isTalking = false; scheduledTime = 0; };
        ptt.onmousedown = ptt.ontouchstart = press;
        ptt.onmouseup = ptt.ontouchend = release;
        window.onclick = () => { if(audioCtx) audioCtx.resume(); };
    </script>
</body>
</html>
