<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Echo1: Binary Stealth</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        :root { --r-green: #94ad94; --r-dark: #1a1a1a; }
        body { background: var(--r-dark); color: #fff; font-family: monospace; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        .radio { background: #333; width: 300px; padding: 25px; border-radius: 40px; border: 4px solid #222; text-align: center; }
        .screen { background: var(--r-green); color: #1a1a1a; padding: 10px; border-radius: 10px; font-weight: bold; min-height: 200px; display: flex; flex-direction: column; margin-bottom: 15px; border: 4px inset rgba(0,0,0,0.2); }
        #ptt { width: 130px; height: 130px; border-radius: 50%; border: 8px solid #222; background: radial-gradient(#555, #222); color: white; font-weight: bold; outline: none; display: none; margin: 0 auto; -webkit-tap-highlight-color: transparent; }
        #ptt:active { background: radial-gradient(#f22, #800); }
        .meter { height: 12px; background: rgba(0,0,0,0.2); border-radius: 6px; overflow: hidden; }
        #fill { height: 100%; width: 0%; background: #000; transition: width 0.1s; }
    </style>
</head>
<body>
    <div class="radio">
        <button id="pwr" style="background:#0f0; padding:15px; border-radius:50px; font-weight:bold;" onclick="start()">CONNECT BINARY LINK</button>
        <div id="ui" style="display:none;">
            <div class="screen">
                <div style="font-size: 0.7rem; display: flex; justify-content: space-between;">
                    <span id="stat">SCANNING...</span>
                    <span id="timer">00:00</span>
                </div>
                <div id="log" style="font-size:0.6rem; text-align:left; flex-grow:1; overflow:hidden;"></div>
                <div style="font-size: 0.6rem; opacity: 0.7;">BINARY FLOW:</div>
                <div class="meter"><div id="fill"></div></div>
            </div>
            <button id="ptt">HOLD TO TALK</button>
        </div>
    </div>

    <script>
        const config = {
            apiKey: "AIzaSyBRZ_E78l5EDRAgyHvE81aZAg9XWZySNrE",
            databaseURL: "https://walky-taky-6b118-default-rtdb.firebaseio.com",
            projectId: "walky-taky-6b118"
        };
        firebase.initializeApp(config);
        const db = firebase.database().ref('binary_v15');
        let audioCtx, myStream, isTalking = false;

        function addLog(m) { document.getElementById('log').innerHTML += `> ${m}<br>`; }

        async function start() {
            document.getElementById('pwr').style.display = 'none';
            document.getElementById('ui').style.display = 'block';
            addLog("Bypassing Packet Inspection...");

            try {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 16000 });
                myStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const source = audioCtx.createMediaStreamSource(myStream);
                const processor = audioCtx.createScriptProcessor(2048, 1, 1);

                source.connect(processor);
                processor.connect(audioCtx.destination);

                processor.onaudioprocess = (e) => {
                    if (isTalking) {
                        const raw = e.inputBuffer.getChannelData(0);
                        // Encode to a safe string to bypass carrier filters
                        db.child('audio').set(btoa(String.fromCharCode.apply(null, new Uint16Array(raw.buffer))));
                    }
                };

                db.child('audio').on('value', (snap) => {
                    const data = snap.val();
                    if (data && !isTalking) {
                        const binary = atob(data);
                        const buffer = new Float32Array(new Uint16Array(Array.from(binary).map(c => c.charCodeAt(0))).buffer);
                        play(buffer);
                        updateMeter(buffer);
                    }
                });

                document.getElementById('ptt').style.display = 'block';
                addLog("Stealth Link: ACTIVE");
            } catch (e) { addLog("Error: Reset Mic Access"); }
        }

        function play(data) {
            const b = audioCtx.createBuffer(1, data.length, 16000);
            b.getChannelData(0).set(data);
            const s = audioCtx.createBufferSource();
            s.buffer = b;
            s.connect(audioCtx.destination);
            s.start();
        }

        function updateMeter(data) {
            let sum = 0;
            for(let i=0; i<data.length; i++) sum += Math.abs(data[i]);
            document.getElementById('fill').style.width = Math.min(100, (sum/data.length)*500) + "%";
        }

        const btn = document.getElementById('ptt');
        btn.onmousedown = btn.ontouchstart = (e) => { e.preventDefault(); isTalking = true; audioCtx.resume(); };
        btn.onmouseup = btn.ontouchend = () => { isTalking = false; };
        window.onclick = () => audioCtx.resume();
    </script>
</body>
</html>
