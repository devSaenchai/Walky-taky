<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Echo1 Recovery</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        body { background: #1a1a1a; color: white; font-family: sans-serif; text-align: center; padding: 20px; }
        .btn { background: #0f0; color: #000; padding: 20px; border-radius: 10px; font-weight: bold; width: 80%; margin: 10px; border: none; font-size: 1.2rem; }
        #ptt { background: #444; height: 150px; width: 150px; border-radius: 50%; color: white; display: none; margin: 20px auto; border: 5px solid #222; }
        #ptt.active { background: #f00; }
        .status-box { background: #333; padding: 15px; border-radius: 10px; margin-bottom: 20px; }
    </style>
</head>
<body>

    <div class="status-box">
        <div id="stat">SYSTEM OFF</div>
        <div id="peers">PEERS: 0</div>
    </div>

    <button id="pwr" class="btn">ACTIVATE RADIO</button>
    <button id="ptt">HOLD TO TALK</button>

    <script>
        // CONFIG FROM YOUR FIREBASE
        const firebaseConfig = {
          apiKey: "AIzaSyBRZ_E78l5EDRAgyHvE81aZAg9XWZySNrE",
          authDomain: "walky-taky-6b118.firebaseapp.com",
          databaseURL: "https://walky-taky-6b118-default-rtdb.firebaseio.com",
          projectId: "walky-taky-6b118",
          storageBucket: "walky-taky-6b118.firebasestorage.app",
          messagingSenderId: "822437639384",
          appId: "1:822437639384:web:4112a27eb316d9e24693ad"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database().ref('radio_lobby');
        
        let myPeer, myStream, audioCtx;
        const pwrBtn = document.getElementById('pwr');
        const pttBtn = document.getElementById('ptt');
        const stat = document.getElementById('stat');

        pwrBtn.onclick = async () => {
            try {
                // FORCE WAKE HARDWARE
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                if(audioCtx.state === 'suspended') await audioCtx.resume();

                // SIMPLEST MIC REQUEST
                myStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                myStream.getAudioTracks()[0].enabled = false;

                stat.innerText = "MIC CONNECTED. INITIALIZING PEER...";
                pwrBtn.style.display = "none";
                pttBtn.style.display = "block";

                initRadio();
            } catch (e) {
                alert("HARDWARE BLOCKED: Close all other apps (Spotify, Phone, etc) and refresh.");
            }
        };

        function initRadio() {
            myPeer = new Peer();
            myPeer.on('open', (id) => {
                stat.innerText = "ONLINE";
                const myRef = db.push(id);
                myRef.onDisconnect().remove();

                db.on('value', snap => {
                    const ids = snap.val() ? Object.values(snap.val()) : [];
                    document.getElementById('peers').innerText = "PEERS: " + (ids.length - 1);
                    ids.forEach(tid => {
                        if(tid !== id) {
                            const call = myPeer.call(tid, myStream);
                            call.on('stream', s => playAudio(s));
                        }
                    });
                });
            });

            myPeer.on('call', c => {
                c.answer(myStream);
                c.on('stream', s => playAudio(s));
            });
        }

        function playAudio(stream) {
            const audio = new Audio();
            audio.srcObject = stream;
            audio.play().catch(() => {
                stat.innerText = "TAP SCREEN TO HEAR AUDIO";
                window.onclick = () => audio.play();
            });
        }

        // PTT LOGIC
        const talk = (e) => {
            if(e) e.preventDefault();
            if(audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
            if(myStream) myStream.getAudioTracks()[0].enabled = true;
            pttBtn.classList.add('active');
            stat.innerText = "TRANSMITTING...";
        };

        const stop = () => {
            if(myStream) myStream.getAudioTracks()[0].enabled = false;
            pttBtn.classList.remove('active');
            stat.innerText = "ONLINE";
        };

        pttBtn.addEventListener('touchstart', talk);
        pttBtn.addEventListener('touchend', stop);
        pttBtn.addEventListener('mousedown', talk);
        pttBtn.addEventListener('mouseup', stop);
    </script>
</body>
</html>
