<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Echo1: Ghost Link</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        :root { --r-green: #94ad94; --r-dark: #1a1a1a; }
        body { background: var(--r-dark); color: #fff; font-family: monospace; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        .radio { background: #333; width: 300px; padding: 25px; border-radius: 40px; border: 5px solid #111; text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.8); }
        .screen { background: var(--r-green); color: #1a1a1a; padding: 12px; border-radius: 12px; font-weight: bold; min-height: 200px; display: flex; flex-direction: column; margin-bottom: 20px; border: 4px inset rgba(0,0,0,0.3); }
        #ptt { width: 140px; height: 140px; border-radius: 50%; border: 10px solid #222; background: radial-gradient(#666, #222); color: white; font-weight: bold; outline: none; display: none; margin: 0 auto; -webkit-tap-highlight-color: transparent; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        #ptt:active { background: radial-gradient(#f00, #600); transform: scale(0.96); box-shadow: 0 2px 5px rgba(0,0,0,0.5); }
        .meter { height: 15px; background: rgba(0,0,0,0.2); border-radius: 8px; overflow: hidden; margin-top: 10px; border: 1px solid rgba(0,0,0,0.1); }
        #fill { height: 100%; width: 0%; background: #000; transition: width 0.05s; }
        .blink { animation: blinker 1s linear infinite; color: #d00; }
        @keyframes blinker { 50% { opacity: 0; } }
    </style>
</head>
<body>

    <div class="radio">
        <button id="pwr" style="background:#0f0; color:#000; padding:18px 30px; border-radius:50px; font-weight:900; border:none; cursor:pointer;" onclick="boot()">CONNECT GHOST-LINK</button>
        <div id="ui" style="display:none;">
            <div class="screen">
                <div style="font-size: 0.75rem; display: flex; justify-content: space-between; border-bottom: 1px solid rgba(0,0,0,0.2); padding-bottom: 5px;">
                    <span id="stat">SCANNING</span>
                    <span id="timer">00:00</span>
                </div>
                <div id="log" style="font-size:0.6rem; text-align:left; flex-grow:1; overflow:hidden; padding: 8px 0; line-height: 1.2;"></div>
                <div style="font-size: 0.6rem; font-weight: 900; letter-spacing: 1px;">ENCRYPTED DATA STREAM:</div>
                <div class="meter"><div id="fill"></div></div>
            </div>
            <button id="ptt">TALK</button>
        </div>
    </div>

    <script>
        const config = {
            apiKey: "AIzaSyBRZ_E78l5EDRAgyHvE81aZAg9XWZySNrE",
            databaseURL: "https://walky-taky-6b118-default-rtdb.firebaseio.com",
            projectId: "walky-taky-6b118"
        };
        firebase.initializeApp(config);
        const db = firebase.database().ref('ghost_v18');
        
        let audioCtx, isTalking = false, bufferQueue = [];

        function addLog(m) { 
            const l = document.getElementById('log');
            l.innerHTML += `> ${m}<br>`; 
            if(l.childNodes.length > 10) l.removeChild(l.firstChild);
        }

        async function boot() {
            document.getElementById('pwr').style.display = 'none';
            document.getElementById('ui').style.display = 'block';
            addLog("Disguising traffic...");

            try {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 16000 });
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const source = audioCtx.createMediaStreamSource(stream);
                const processor = audioCtx.createScriptProcessor(4096, 1, 1);

                source.connect(processor);
                processor.connect(audioCtx.destination);

                processor.onaudioprocess = (e) => {
                    if (isTalking) {
                        const input = e.inputBuffer.getChannelData(0);
                        // Encode as string - looks like normal chat data to Jio/Vi
                        db.child('ch').set(btoa(JSON.stringify(Array.from(input))));
                    }
                };

                db.child('ch').on('value', (snap) => {
                    const data = snap.val();
                    if (data && !isTalking) {
                        const raw = JSON.parse(atob(data));
                        play(new Float32Array(raw));
                        updateMeter(raw);
                    }
                });

                document.getElementById('ptt').style.display = 'block';
                addLog("Link Secure. Port 443.");
            } catch (err) { addLog("Critical: Mic Blocked"); }
        }

        function play(data) {
            const b = audioCtx.createBuffer(1, data.length, 16000);
            b.getChannelData(0).set(data);
            const s = audioCtx.createBufferSource();
            s.buffer = b;
            s.connect(audioCtx.destination);
            s.start();
        }

        function updateMeter(data) {
            let sum = 0;
            for(let i=0; i<data.length; i++) sum += Math.abs(data[i]);
            document.getElementById('fill').style.width = Math.min(100, (sum/data.length)*1000) + "%";
        }

        const ptt = document.getElementById('ptt');
        const triggerStart = (e) => { 
            e.preventDefault(); 
            isTalking = true; 
            audioCtx.resume(); 
            document.getElementById('stat').innerText = "TRANSMIT";
            document.getElementById('stat').classList.add('blink');
        };
        const triggerEnd = () => { 
            isTalking = false; 
            document.getElementById('stat').innerText = "LINKED";
            document.getElementById('stat').classList.remove('blink');
        };

        ptt.onmousedown = ptt.ontouchstart = triggerStart;
        ptt.onmouseup = ptt.ontouchend = triggerEnd;
        window.onclick = () => { if(audioCtx) audioCtx.resume(); };
    </script>
</body>
</html>
