<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Echo1 Final Build</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        :root { --radio-green: #94ad94; --radio-dark: #1a1a1a; }
        body { background: var(--radio-dark); color: #fff; font-family: 'Courier New', monospace; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; touch-action: none; overflow: hidden; }
        .radio-body { background: #333; width: 280px; padding: 30px; border-radius: 40px; border: 4px solid #222; text-align: center; box-shadow: 0 10px 20px rgba(0,0,0,0.5); position: relative; }
        .screen { background: var(--radio-green); color: #1a1a1a; padding: 15px; border-radius: 10px; font-weight: bold; margin-bottom: 20px; border: 4px inset rgba(0,0,0,0.2); min-height: 110px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #ptt-btn { width: 140px; height: 140px; border-radius: 50%; border: 10px solid #222; background: radial-gradient(#555, #222); color: white; font-weight: bold; font-size: 1rem; outline: none; -webkit-tap-highlight-color: transparent; box-shadow: 0 6px 0 #111; user-select: none; cursor: pointer; }
        #ptt-btn:active { background: radial-gradient(#f22, #800); transform: translateY(4px); box-shadow: 0 2px 0 #111; }
        .power-btn { background: #0f0; color: #000; border: none; padding: 15px 30px; border-radius: 50px; cursor: pointer; font-weight: bold; font-size: 1.1rem; box-shadow: 0 4px 0 #080; }
        .hidden { display: none; }
        .meter-label { font-size: 0.6rem; margin-top: 5px; opacity: 0.8; text-transform: uppercase; font-weight: 900; }
        #in-meter, #out-meter { font-weight: 900; letter-spacing: 2px; height: 18px; font-size: 1.2rem; color: #1a1a1a; }
        .led { width: 10px; height: 10px; border-radius: 50%; background: #200; margin: 0 auto 10px; border: 1px solid #000; }
        .led.on { background: #f00; box-shadow: 0 0 8px #f00; }
    </style>
</head>
<body>

    <div class="radio-body">
        <button id="start-btn" class="power-btn">SYSTEM POWER ON</button>
        
        <div id="ui-container" class="hidden">
            <div id="tx-led" class="led"></div>
            <div class="screen">
                <div id="status">CONNECTING...</div>
                <div style="font-size: 0.7rem;">PEERS ACTIVE: <span id="peer-count">0</span></div>
                <hr style="width: 80%; border: 0.5px solid rgba(0,0,0,0.1); margin: 8px 0;">
                <div class="meter-label">TX (YOU)</div>
                <div id="out-meter">----</div>
                <div class="meter-label">RX (THEM)</div>
                <div id="in-meter">----</div>
            </div>
            <button id="ptt-btn">PUSH<br>TO TALK</button>
            <p style="font-size: 9px; color: #777; margin-top: 15px; letter-spacing: 1px;">SECURE CHANNEL: 6B118</p>
        </div>
    </div>

    <script>
        // CONFIG FROM FIREBASE CONSOLE
        const firebaseConfig = {
          apiKey: "AIzaSyBRZ_E78l5EDRAgyHvE81aZAg9XWZySNrE",
          authDomain: "walky-taky-6b118.firebaseapp.com",
          databaseURL: "https://walky-taky-6b118-default-rtdb.firebaseio.com",
          projectId: "walky-taky-6b118",
          storageBucket: "walky-taky-6b118.firebasestorage.app",
          messagingSenderId: "822437639384",
          appId: "1:822437639384:web:4112a27eb316d9e24693ad"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database().ref('radio_lobby');
        
        let peer, myStream, audioCtx, myAnalyzer, remoteAnalyzer;
        let activeCalls = new Set();

        document.getElementById('start-btn').onclick = async function() {
            this.classList.add('hidden');
            document.getElementById('ui-container').classList.remove('hidden');
            
            // 1. FORCE WAKE AUDIO CONTEXT
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if(audioCtx.state === 'suspended') audioCtx.resume();

            try {
                // 2. INITIALIZE MICROPHONE
                myStream = await navigator.mediaDevices.getUserMedia({ 
                    audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true } 
                });
                
                // 3. ATTACH OUTGOING ANALYZER
                myAnalyzer = audioCtx.createAnalyzer();
                audioCtx.createMediaStreamSource(myStream).connect(myAnalyzer);
                myStream.getAudioTracks()[0].enabled = false;

                // 4. INITIALIZE PEER AND LOBBY
                peer = new Peer();
                
                peer.on('open', (id) => {
                    document.getElementById('status').innerText = "ONLINE";
                    const myIdRef = db.push(id);
                    myIdRef.onDisconnect().remove();

                    // LOBBY LOGIC: Find everyone else
                    db.on('value', (snap) => {
                        const allIds = snap.val() ? Object.values(snap.val()) : [];
                        document.getElementById('peer-count').innerText = Math.max(0, allIds.length - 1);
                        
                        allIds.forEach(targetId => {
                            if (targetId !== id && !activeCalls.has(targetId)) {
                                const call = peer.call(targetId, myStream);
                                call.on('stream', (remote) => {
                                    activeCalls.add(targetId);
                                    setupIncomingAudio(remote);
                                });
                            }
                        });
                    });
                });

                // HANDLE INCOMING CALLS
                peer.on('call', (call) => {
                    call.answer(myStream);
                    call.on('stream', (remote) => setupIncomingAudio(remote));
                });

                startVisualizer();
            } catch (err) {
                document.getElementById('status').innerText = "PERM ERROR";
                alert("Microphone permission is required!");
            }
        };

        function setupIncomingAudio(stream) {
            // Bypass mobile "Auto-Mute" by piping through Web Audio Destination
            const source = audioCtx.createMediaStreamSource(stream);
            remoteAnalyzer = audioCtx.createAnalyzer();
            
            const gainNode = audioCtx.createGain();
            gainNode.gain.value = 1.5; // Boost volume 150%

            source.connect(remoteAnalyzer);
            remoteAnalyzer.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            // Backup legacy audio element for some browsers
            const audio = new Audio();
            audio.srcObject = stream;
            audio.play().catch(e => console.log("Legacy play blocked"));
        }

        function startVisualizer() {
            const data = new Uint8Array(64);
            function render() {
                // TX Meter (You)
                if(myAnalyzer && myStream.getAudioTracks()[0].enabled) {
                    myAnalyzer.getByteFrequencyData(data);
                    let v = data.reduce((a,b)=>a+b)/64;
                    document.getElementById('out-meter').innerText = v > 10 ? "▓▒░▒▓█" : "----";
                } else {
                    document.getElementById('out-meter').innerText = "----";
                }

                // RX Meter (Them)
                if(remoteAnalyzer) {
                    remoteAnalyzer.getByteFrequencyData(data);
                    let v = data.reduce((a,b)=>a+b)/64;
                    document.getElementById('in-meter').innerText = v > 10 ? "▓▒░▒▓█" : "----";
                }
                requestAnimationFrame(render);
            }
            render();
        }

        const ptt = document.getElementById('ptt-btn');
        const led = document.getElementById('tx-led');

        const txStart = (e) => {
            if(e) e.preventDefault();
            // Force hardware audio resume on every tap
            if(audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
            
            if(myStream) {
                myStream.getAudioTracks()[0].enabled = true;
                led.classList.add('on');
                document.getElementById('status').innerText = "TRANSMITTING";
            }
        };

        const txStop = () => {
            if(myStream) {
                myStream.getAudioTracks()[0].enabled = false;
                led.classList.remove('on');
                document.getElementById('status').innerText = "ONLINE";
            }
        };

        ptt.addEventListener('touchstart', txStart);
        ptt.addEventListener('touchend', txStop);
        ptt.addEventListener('mousedown', txStart);
        ptt.addEventListener('mouseup', txStop);
    </script>
</body>
</html>
